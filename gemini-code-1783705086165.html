<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taşdoğan Unlu Mamulleri - Filo Yönetimi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
  </style>
</head>
<body class="bg-stone-100 text-stone-800 min-h-screen font-sans antialiased p-4 md:p-8">

  <div class="max-w-7xl mx-auto space-y-8">
    
    <div class="flex flex-col md:flex-row items-center justify-between bg-white p-6 rounded-2xl border border-stone-200 shadow-sm">
      <div class="flex items-center gap-4">
        <div class="bg-amber-100 p-3 rounded-xl text-amber-600 text-2xl">
          <i class="fa-solid fa-wheat-awn"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-stone-900">Taşdoğan Unlu Mamulleri</h1>
          <p class="text-stone-500 text-sm mt-1">Dağıtım Araçları ve Filo Takip Sistemi</p>
        </div>
      </div>
      
      <button id="checkAndSendBtn" class="mt-4 md:mt-0 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition duration-300 shadow-lg shadow-green-600/30 flex items-center gap-2">
        <i class="fa-brands fa-whatsapp text-xl"></i> Sürücüleri WhatsApp'tan Uyar
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="bg-white p-6 rounded-2xl border border-stone-200 shadow-sm h-fit">
        <h2 class="text-lg font-bold mb-5 text-stone-800 flex items-center gap-2">
          <i class="fa-solid fa-truck-fast text-amber-500"></i> Yeni Araç Kaydı
        </h2>
        
        <form id="vehicleForm" class="space-y-4">
          <div>
            <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Sürücü / Sorumlu Personel</label>
            <input type="text" id="sorumluAdi" placeholder="Örn: Mehmet Usta" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition" required>
          </div>
          
          <div>
            <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Araç Plakası</label>
            <input type="text" id="plaka" placeholder="27 ABC 123" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 uppercase focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition font-mono font-bold" required>
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">WhatsApp 1 (Sürücü)</label>
              <input type="tel" id="telefon1" placeholder="905xxxxxxxxx" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none transition" required>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">WhatsApp 2 (Yönetici)</label>
              <input type="tel" id="telefon2" placeholder="Opsiyonel" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none transition">
            </div>
          </div>
          
          <div class="pt-4 border-t border-stone-100 space-y-3">
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Muayene Bitiş</label>
              <input type="date" id="muayene" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none" required>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Sigorta Bitiş</label>
              <input type="date" id="sigorta" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none" required>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Bakım Zamanı</label>
              <input type="date" id="bakim" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none" required>
            </div>
          </div>
          
          <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 mt-4 flex items-center justify-center gap-2">
            <i class="fa-solid fa-floppy-disk"></i> Filoya Ekle
          </button>
        </form>
      </div>

      <div class="lg:col-span-2 bg-white p-6 rounded-2xl border border-stone-200 shadow-sm">
        <h2 class="text-lg font-bold text-stone-800 mb-4">Aktif Dağıtım Araçları</h2>
        <div class="overflow-x-auto rounded-xl border border-stone-200">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-stone-100 text-stone-600 text-xs uppercase font-bold">
                <th class="p-4">Sürücü / Sorumlu</th>
                <th class="p-4">Plaka</th>
                <th class="p-4">Tarihler (M/S/B)</th>
                <th class="p-4">İletişim</th>
              </tr>
            </thead>
            <tbody id="vehicleTableBody" class="divide-y divide-stone-200 text-sm">
              <tr><td colspan="4" class="p-8 text-center text-stone-500">Veriler yükleniyor...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      
    </div>
  </div>

  <script type="module">
    import
