<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel Sıralı Mağaza Rotası</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 1.8rem;
        }
        .stats {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #555;
            background: #e9ecef;
            padding: 10px;
            border-radius: 8px;
        }
        .store-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border-left: 6px solid #e74c3c;
        }
        .store-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        .store-info {
            flex-grow: 1;
        }
        .store-info h3 {
            margin: 0 0 8px 0;
            color: #2c3e50;
            display: flex;
            align-items: center;
        }
        .store-info p {
            margin: 0;
            color: #7f8c8d;
            font-size: 0.95rem;
        }
        .store-number {
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .btn-location {
            background-color: #2ecc71;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        .btn-location:hover {
            background-color: #27ae60;
        }
        @media (max-width: 600px) {
            .store-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .btn-location {
                width: 100%;
                justify-content: center;
                box-sizing: border-box;
            }
        }
    </style>
</head>
