<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taşdoğan Unlu Mamulleri - Filo Yönetimi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
  </style>
</head>
<body class="bg-stone-100 text-stone-800 min-h-screen font-sans antialiased p-4 md:p-8">

  <div class="max-w-7xl mx-auto space-y-8">
    
    <div class="flex flex-col md:flex-row items-center justify-between bg-white p-6 rounded-2xl border border-stone-200 shadow-sm">
      <div class="flex items-center gap-4">
        <div class="bg-amber-100 p-3 rounded-xl text-amber-600 text-2xl">
          <i class="fa-solid fa-wheat-awn"></i>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-stone-900">Taşdoğan Unlu Mamulleri</h1>
          <p class="text-stone-500 text-sm mt-1">Dağıtım Araçları ve Filo Takip Sistemi</p>
        </div>
      </div>
      
      <button id="checkAndSendBtn" class="mt-4 md:mt-0 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl transition duration-300 shadow-lg shadow-green-600/30 flex items-center gap-2">
        <i class="fa-brands fa-whatsapp text-xl"></i> Sürücüleri WhatsApp'tan Uyar
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="bg-white p-6 rounded-2xl border border-stone-200 shadow-sm h-fit">
        <h2 class="text-lg font-bold mb-5 text-stone-800 flex items-center gap-2">
          <i class="fa-solid fa-truck-fast text-amber-500"></i> Yeni Araç Kaydı
        </h2>
        
        <form id="vehicleForm" class="space-y-4">
          <div>
            <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Sürücü / Sorumlu Personel</label>
            <input type="text" id="sorumluAdi" placeholder="Örn: Mehmet Usta" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition" required>
          </div>
          
          <div>
            <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Araç Plakası</label>
            <input type="text" id="plaka" placeholder="27 ABC 123" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 uppercase focus:border-amber-500 focus:ring-1 focus:ring-amber-500 outline-none transition font-mono font-bold" required>
          </div>
          
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">WhatsApp 1 (Sürücü)</label>
              <input type="tel" id="telefon1" placeholder="905xxxxxxxxx" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none transition" required>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">WhatsApp 2 (Yönetici)</label>
              <input type="tel" id="telefon2" placeholder="Opsiyonel" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none transition">
            </div>
          </div>
          
          <div class="pt-4 border-t border-stone-100 space-y-3">
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Muayene Bitiş</label>
              <input type="date" id="muayene" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none" required>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Sigorta Bitiş</label>
              <input type="date" id="sigorta" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none" required>
            </div>
            <div>
              <label class="block text-xs font-bold uppercase tracking-wide text-stone-500 mb-1">Bakım Zamanı</label>
              <input type="date" id="bakim" class="w-full bg-stone-50 border border-stone-300 rounded-xl p-3 text-stone-800 focus:border-amber-500 outline-none" required>
            </div>
          </div>
          
          <button type="submit" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 mt-4 flex items-center justify-center gap-2">
            <i class="fa-solid fa-floppy-disk"></i> Filoya Ekle
          </button>
        </form>
      </div>

      <div class="lg:col-span-2 bg-white p-6 rounded-2xl border border-stone-200 shadow-sm">
        <h2 class="text-lg font-bold text-stone-800 mb-4">Aktif Dağıtım Araçları</h2>
        <div class="overflow-x-auto rounded-xl border border-stone-200">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-stone-100 text-stone-600 text-xs uppercase font-bold">
                <th class="p-4">Sürücü / Sorumlu</th>
                <th class="p-4">Plaka</th>
                <th class="p-4">Tarihler (M/S/B)</th>
                <th class="p-4">İletişim</th>
              </tr>
            </thead>
            <tbody id="vehicleTableBody" class="divide-y divide-stone-200 text-sm">
              <tr><td colspan="4" class="p-8 text-center text-stone-500"><i class="fa-solid fa-spinner animate-spin"></i> Veritabanına bağlanılıyor...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      
    </div>
  </div>

  <script type="module">
    // Firebase 10.8.0 sürümü (Vercel ve tarayıcılarla %100 uyumlu stabil sürüm)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- 1. FIREBASE AYARLARI ---
    const firebaseConfig = {
      apiKey: "AIzaSyBF0bchfUsw4yo1q1wU-rowR8RZ24CDgJ0",
      authDomain: "mete-73d7c.firebaseapp.com",
      projectId: "mete-73d7c",
      storageBucket: "mete-73d7c.firebasestorage.app",
      messagingSenderId: "785562796791",
      appId: "1:785562796791:web:4ee9767daf4a13a981c9f2",
      measurementId: "G-191XRBGG83"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 2. ULTRAMSG API AYARLARI ---
    const ULTRAMSG_INSTANCE_ID = "instance184322"; 
    const ULTRAMSG_TOKEN = "r61y4pgaeu93vu7p"; 

    async function sendWhatsApp(phone, message) {
      if (!phone) return;
      
      const formattedPhone = phone.replace(/\D/g, ''); 
      const url = `https://api.ultramsg.com/${ULTRAMSG_INSTANCE_ID}/messages/chat`;
      
      const data = new URLSearchParams();
      data.append("token", ULTRAMSG_TOKEN);
      data.append("to", `+${formattedPhone}`);
      data.append("body", message);

      try {
        const response = await fetch(url, { 
          method: 'POST', 
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: data 
        });
        
        const yanit = await response.json();
        console.log(`Ultramsg Yanıtı (${formattedPhone}):`, yanit);
        
      } catch (error) {
        console.error("Ultramsg Bağlantı Hatası:", error);
      }
    }

    // --- 3. TARİH HESAPLAMA ---
    function checkDaysLeft(dateStr) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const target = new Date(dateStr);
      target.setHours(0,0,0,0);
      return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
    }

    // --- 4. ARAÇ KAYIT ---
    document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await addDoc(collection(db, "araclar"), {
          sorumluAdi: document.getElementById('sorumluAdi').value.trim(),
          plaka: document.getElementById('plaka').value.trim().toUpperCase(),
          telefon1: document.getElementById('telefon1').value.trim(),
          telefon2: document.getElementById('telefon2').value.trim(),
          muayeneTarihi: document.getElementById('muayene').value,
          sigortaTarihi: document.getElementById('sigorta').value,
          bakimTarihi: document.getElementById('bakim').value
        });
        alert("Araç Taşdoğan Unlu Mamulleri filosuna başarıyla eklendi!");
        e.target.reset();
      } catch (error) {
        alert("Kayıt sırasında bir hata oluştu! Lütfen sayfayı yenileyip tekrar deneyin.");
        console.error("Kayıt Hatası: ", error);
      }
    });

    // --- 5. WHATSAPP BİLDİRİMİ ---
    document.getElementById('checkAndSendBtn').addEventListener('click', async () => {
      const btn = document.getElementById('checkAndSendBtn');
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Kontroller Yapılıyor...`;
      btn.disabled = true;

      try {
        const snapshot = await getDocs(collection(db, "araclar"));
        let gonderimSayisi = 0;

        const saat = new Date().getHours();
        let selamlama = "İyi günler";
        if (saat >= 5 && saat < 12) selamlama = "Günaydın";
        else if (saat >= 17 && saat < 22) selamlama = "İyi akşamlar";

        for (const doc of snapshot.docs) {
          const data = doc.data();
          let islemler = [];
          
          const muayeneFark = checkDaysLeft(data.muayeneTarihi);
          const sigortaFark = checkDaysLeft(data.sigortaTarihi);
          const bakimFark = checkDaysLeft(data.bakimTarihi);

          // Sadece 7 gün ve daha az kalanlar için tetiklenir
          if (muayeneFark >= 0 && muayeneFark <= 7) islemler.push('Muayene');
          if (sigortaFark >= 0 && sigortaFark <= 7) islemler.push('Sigorta');
          if (bakimFark >= 0 && bakimFark <= 7) islemler.push('Bakım');

          if (islemler.length > 0) {
            const islemMetni = islemler.join(' / '); 
            
            const waMesaji = `🍞 *Taşdoğan Unlu Mamulleri - Filo Uyarısı*\n\n${selamlama} Sayın ${data.sorumluAdi},\n\nDağıtım operasyonlarında aktif olarak görev alan *${data.plaka}* plakalı aracımızın *${islemMetni}* tarihi yaklaşmaktadır.\n\nGerekli planlamaların yapılması için muhasebe birimi Mete Bey ile iletişime geçiniz.\n\nİyi çalışmalar dileriz.`;
            
            if(data.telefon1) await sendWhatsApp(data.telefon1, waMesaji);
            if(data.telefon2) await sendWhatsApp(data.telefon2, waMesaji);
            gonderimSayisi++;
          }
        }
        
        if (gonderimSayisi > 0) {
          alert(`İşlem Tamamlandı! ${gonderimSayisi} aracın sorumlusuna WhatsApp üzerinden uyarı mesajı iletildi.`);
        } else {
          alert(`Uyarı gönderilecek araç bulunamadı. Lütfen işlem tarihine 7 gün veya daha az kalmış araçları kontrol edin.`);
        }
        
      } catch (error) {
        alert("Gönderim sırasında hata oluştu. İnternet bağlantınızı kontrol edip tekrar deneyin.");
        console.error("Gönderim Butonu Hatası:", error);
      } finally {
        btn.innerHTML = `<i class="fa-brands fa-whatsapp text-xl"></i> Sürücüleri WhatsApp'tan Uyar`;
        btn.disabled = false;
      }
    });

    // --- 6. TABLO LİSTELEME ---
    onSnapshot(collection(db, "araclar"), (snapshot) => {
      const tbody = document.getElementById('vehicleTableBody');
      let html = "";
      
      if(snapshot.empty) {
        tbody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-stone-500">Filoya henüz araç eklenmedi. Sol taraftaki formu kullanarak ilk aracı ekleyebilirsiniz.</td></tr>`;
        return;
      }

      snapshot.forEach(doc => {
        const d = doc.data();
        html += `
          <tr class="hover:bg-amber-50/50 transition">
            <td class="p-4 text-stone-700 font-semibold flex items-center gap-2">
              <i class="fa-solid fa-user-tie text-stone-400 text-xs"></i> ${d.sorumluAdi}
            </td>
            <td class="p-4 font-mono font-bold text-amber-600">${d.plaka}</td>
            <td class="p-4 text-xs space-y-1 text-stone-600">
              <div class="flex justify-between w-28"><span class="font-bold text-stone-400">Muayene:</span> <span>${d.muayeneTarihi}</span></div>
              <div class="flex justify-between w-28"><span class="font-bold text-stone-400">Sigorta:</span> <span>${d.sigortaTarihi}</span></div>
              <div class="flex justify-between w-28"><span class="font-bold text-stone-400">Bakım:</span> <span>${d.bakimTarihi}</span></div>
            </td>
            <td class="p-4 text-xs text-stone-500 font-mono tracking-tighter">
              ${d.telefon1} <br> ${d.telefon2 || '-'}
            </td>
          </tr>`;
      });
      tbody.innerHTML = html;
    }, (error) => {
        console.error("Firestore Dinleme Hatası:", error);
        document.getElementById('vehicleTableBody').innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500">Veritabanına bağlanılamadı. Lütfen Firebase kurallarını (Rules) kontrol edin.</td></tr>`;
    });
  </script>
</body>
</html>
